name: IVANNA-OMEGA-SUPREME CI

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: omega-${{ github.ref }}
  cancel-in-progress: true

env:
  ANDROID_COMPILE_SDK: "35"
  ANDROID_BUILD_TOOLS: "35.0.0"
  ANDROID_NDK_VERSION: "25.1.8937393"
  ANDROID_CMAKE_VERSION: "3.22.1"
  CMDLINE_TOOLS_VERSION: "11076708"   # commandlinetools-linux-11076708_latest.zip (estable)

jobs:

# ─────────────────────────────────────────────────────────────────────────────
# JOB 0 — DSP native unit tests (host-side, sin NDK, ~1 min)
#
# AUDIT ADD: cpp/tests/ (GoogleTest + CTest, con perfiles ASan/TSan) ya
# existía en el repo con 3 suites de estabilidad numérica del DSP real
# (gammatone, denormals, pipeline EQ/compresor/exciter/widener/gain), pero
# ningún job de este workflow las compilaba ni ejecutaba — vivían en disco
# sin correr nunca en CI. Se agregan aquí como gate rápido e independiente
# del build de Android: no requiere NDK/SDK, corre en segundos, y da señal
# de "¿el DSP sigue siendo numéricamente estable?" mucho antes de esperar
# los ~10 min del build completo con NDK.
# ─────────────────────────────────────────────────────────────────────────────
  test-native-dsp:
    name: DSP Native Tests (host, CTest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Configure (Release)
        run: |
          cmake -B build-tests -S app/src/main/cpp/tests -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build-tests -j

      - name: Run tests
        run: ctest --test-dir build-tests --output-on-failure

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — APK (NDK C++ + Kotlin/Compose)
# ─────────────────────────────────────────────────────────────────────────────
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android SDK (manual, sin acción rota)
        run: |
          set -euo pipefail
          export ANDROID_SDK_ROOT="$HOME/android-sdk"
          export ANDROID_HOME="$ANDROID_SDK_ROOT"
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
          cd "$ANDROID_SDK_ROOT/cmdline-tools"

          echo "▶ Descargando commandlinetools..."
          curl -fsSL -o tools.zip \
            "https://dl.google.com/android/repository/commandlinetools-linux-${CMDLINE_TOOLS_VERSION}_latest.zip"
          unzip -q tools.zip
          rm tools.zip
          # Estructura esperada por sdkmanager: cmdline-tools/latest/...
          mv cmdline-tools latest

          SDKMGR="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH"

          echo "▶ Aceptando licencias..."
          yes | "$SDKMGR" --licenses >/dev/null 2>&1 || true

          echo "▶ Instalando paquetes SDK..."
          "$SDKMGR" \
            "platform-tools" \
            "platforms;android-${ANDROID_COMPILE_SDK}" \
            "build-tools;${ANDROID_BUILD_TOOLS}" \
            "ndk;${ANDROID_NDK_VERSION}" \
            "cmake;${ANDROID_CMAKE_VERSION}"

          # Exporta para los siguientes pasos
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT"    >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          echo "$ANDROID_SDK_ROOT/platform-tools"            >> "$GITHUB_PATH"

      - name: Generate local.properties
        run: |
          printf 'sdk.dir=%s\n' "$ANDROID_SDK_ROOT" > local.properties

      - name: Create debug keystore
        run: |
          mkdir -p ~/.android
          if [ ! -f ~/.android/debug.keystore ]; then
            keytool -genkeypair -noprompt \
              -keystore ~/.android/debug.keystore \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Setup Gradle (cache + retry on distribution download)
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Build Debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace --info

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace --info

      - name: List generated APKs
        run: find app/build/outputs/apk -name "*.apk" | sort

      - name: Verify libomega_effect.so NOT in APK
        run: |
          set -e
          APK=$(find app/build/outputs/apk -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: no APK produced"; exit 1
          fi
          if unzip -l "$APK" | grep -q "libomega_effect.so"; then
            echo "ERROR: libomega_effect.so leaked into APK"
            exit 1
          fi
          echo "OK: libomega_effect.so correctly excluded"

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: ivanna-omega-apks
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: error
          overwrite: true
          retention-days: 14

      - name: Extract and validate libomega_effect.so for Magisk
        run: |
          set -euo pipefail
          SO=$(find app/build/intermediates -name "libomega_effect.so" \
               -path "*/arm64-v8a/*" 2>/dev/null | head -1)
          if [ -z "$SO" ]; then
            echo "ERROR: libomega_effect.so not found in build intermediates"
            exit 1
          fi
          test -s "$SO"
          file "$SO" | grep -q "ELF"
          # FIX (causa raíz real del fallo en dispositivo, Android 15):
          # AUDIO_EFFECT_LIBRARY_INFO_SYM es un MACRO de AOSP que se expande
          # a AELI (ver audio_effect_compat.h) — el símbolo real que
          # audioserver busca con dlsym() en el .so es literalmente "AELI",
          # NUNCA el string "AUDIO_EFFECT_LIBRARY_INFO_SYM". El check viejo
          # ("strings | grep AUDIO_EFFECT_LIBRARY_INFO_SYM") daba falso
          # positivo: encontraba comentarios/nombres de macro en el binario,
          # no el símbolo dinámico real, y dejaba pasar builds rotos que
          # fallaban con "failed not find symbol AELI" en dispositivo real.
          # Se valida contra .dynsym (que es lo que dlsym() usa en runtime),
          # no contra `strings` ni `readelf -s` (tabla estática, irrelevante
          # para dlopen/dlsym).
          READELF="${ANDROID_NDK_HOME:-$ANDROID_NDK_LATEST_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-readelf"
          if [ ! -x "$READELF" ]; then READELF=readelf; fi
          echo "── .dynsym de $SO ──"
          "$READELF" --dyn-syms "$SO" | grep -E "AELI|AUDIO_EFFECT_LIBRARY_INFO_SYM" || true
          SYMS=$("$READELF" --dyn-syms "$SO" || true)
          echo "$SYMS"

          if ! echo "$SYMS" | grep -qE '(^|[[:space:]])AELI([[:space:]]|$)'; then
            echo "ERROR: símbolo dinámico AELI no encontrado en .dynsym."
            echo "audioserver hará dlsym(handle, \"AELI\") y fallará igual que en dispositivo real."
            exit 1
          fi
          cp "$SO" libomega_effect_arm64.so
          ls -lh libomega_effect_arm64.so
          echo "Extracted and validated: $SO (símbolo AELI confirmado en .dynsym)"

      - name: Upload libomega_effect.so
        uses: actions/upload-artifact@v4
        with:
          name: omega-effect-so
          path: libomega_effect_arm64.so
          if-no-files-found: warn
          retention-days: 14

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — Magisk Module
# ─────────────────────────────────────────────────────────────────────────────
  build-magisk:
    name: Build Magisk Module
    runs-on: ubuntu-latest
    needs: [build-apk]

    steps:
      - uses: actions/checkout@v5

      - name: Download libomega_effect.so
        uses: actions/download-artifact@v4
        with:
          name: omega-effect-so
          path: effect-so/

      - name: Assemble and validate Magisk module
        run: |
          set -euo pipefail
          DST="magisk_module/system/vendor/lib64/soundfx"
          mkdir -p "$DST"
          test -s effect-so/libomega_effect_arm64.so
          file effect-so/libomega_effect_arm64.so | grep -q "ELF"
          cp effect-so/libomega_effect_arm64.so "$DST/libomega_effect.so"
          test -s "$DST/libomega_effect.so"
          ls -lh "$DST/"

      - name: Package Magisk zip
        run: |
          cd magisk_module
          zip -r ../ivanna-omega-magisk.zip . \
            --exclude "*.git*" --exclude "*.DS_Store"
          echo "=== Module contents ==="
          unzip -l ../ivanna-omega-magisk.zip
          du -sh ../ivanna-omega-magisk.zip

      - name: Upload Magisk module
        uses: actions/upload-artifact@v4
        with:
          name: ivanna-omega-magisk
          path: ivanna-omega-magisk.zip
          if-no-files-found: error
          overwrite: true
          retention-days: 14

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3 — Release Bundle
# ─────────────────────────────────────────────────────────────────────────────
  bundle-release:
    name: Bundle Release
    runs-on: ubuntu-latest
    needs: [build-apk, build-magisk]

    steps:
      - name: Download APKs
        uses: actions/download-artifact@v4
        with:
          name: ivanna-omega-apks
          path: release/apk

      - name: Download Magisk module
        uses: actions/download-artifact@v4
        with:
          name: ivanna-omega-magisk
          path: release/magisk

      - name: Release inventory
        run: |
          echo "=== APKs ===" && find release/apk -name "*.apk" -exec ls -lh {} \;
          echo "=== Magisk ===" && ls -lh release/magisk/

      - name: Upload complete release
        uses: actions/upload-artifact@v4
        with:
          name: IVANNA-OMEGA-SUPREME-${{ github.sha }}
          path: release/
          if-no-files-found: error
          retention-days: 30


  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [bundle-release]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download APKs
        uses: actions/download-artifact@v4
        with:
          name: ivanna-omega-apks
          path: release/apk

      - name: Download Magisk module
        uses: actions/download-artifact@v4
        with:
          name: ivanna-omega-magisk
          path: release/magisk

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/magisk/ivanna-omega-magisk.zip
            release/apk/**/*.apk
          generate_release_notes: true
